<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>
<body>
    <div class="Container">
        <div class="openAddBookForm">
            <i class="fa-solid fa-plus"></i>
        </div>
        <div class="header">
            <h1>Library</h1>
            <div class="search">
                <i class="fa-solid fa-magnifying-glass"></i>

                <input class="searchInput" type="text" placeholder="Search for books...">
             </div>
     <div class="categoryFilter">
          
            <select id="categorySelect">
                <option value="All">All Categories</option>
                <option value="Philosophical">Philosophical</option>
                <option value="Relatic">passionate</option>
                <option value="Relatic">Relatic</option>
            </select>
     </div>
    
        </div>
        <div class="addBook ">
       
            <form action="">
                     <div class="close">
                <i class="fa-solid fa-xmark"></i>
            </div>
                <input class="bookTitle" required type="text" placeholder="Book Title">
                <input class="author" required type="text" placeholder="Author">
                <input class="category" required type="text" placeholder="Category">
                <input class="image" required type="file" placeholder="Image">
              <div>  <input class="available" type="checkbox"> Available </div>
                          <!-- reference inputs -->
<input class="refDate" type="number"  placeholder="Publish Year (optional)">
<input class="refFloor" type="number" placeholder="Floor (optional)">
<input class="refRoom" type="number" placeholder="Room (optional)">

              <button class="addBookButton" type="submit">Add Book</button>
            </form>
        </div>
        <div class="Books">

   
         </div>
       
    <script src="/logic.js"></script>
</body>
</html>
